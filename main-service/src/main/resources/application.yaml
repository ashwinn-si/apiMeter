server:
  port: 8081

spring:
  application:
    name: main-service

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:mysql://localhost:3306/rateLimiter
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  cloud:
    openfeign:
      micrometer:
        enabled: true

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: asdsadknasdiasndi123123sadisand123021312
  expirationTime: 1500000

redis:
  ttl: 15
  bucketRefreshTime: 5
  noTokenAllowed: 5
  tokenBucket:
    noTokenPerMin: 1

