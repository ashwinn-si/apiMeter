server:
  port: 8081
spring:
  application:
    name: main-service
  datasource:
    url: jdbc:mysql://localhost:3306/rateLimiter
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true

    sql:
      init:
        mode: never

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

