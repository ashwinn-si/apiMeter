server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        routes:
          - id: main-service-route
            uri: lb://MAIN-SERVICE
            predicates:
              - Path=/main/**
            filters:
              - RewritePath=/main/(?<segment>.*), /${segment}

    openfeign:
      micrometer:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans


